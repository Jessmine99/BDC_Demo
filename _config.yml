title: 'IBM HCD + EA BDC Lab'

remote_theme: just-the-docs/just-the-docs
color_scheme: openrndr
plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-sitemap

url:  https://github.com/Jessmine99
baseurl:  /BDC_Demo

search_enabled: true
heading_anchors: true
nav_enabled: true

# Makes Aux links open in a new tab. Default is false
aux_links_new_tab: false
  
aux_links:
  BDC demo on GitHub:
    - https://github.com/Jessmine99/BDC_Demo

# Show an "On this page" table of contents
toc_enabled: true

callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red
