<div class="sidebar-theme-toggle">
  <button class="btn js-toggle-dark-mode" type="button">
    Preview dark color scheme
  </button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const btn = document.querySelector(".js-toggle-dark-mode");
  if (!btn || typeof jtd === "undefined") return;

  function syncLabel() {
    btn.textContent =
      jtd.getTheme() === "dark"
        ? "Return to the light side"
        : "Preview dark color scheme";
  }

  btn.addEventListener("click", function () {
    jtd.setTheme(jtd.getTheme() === "dark" ? "light" : "dark");
    syncLabel();
  });

  syncLabel();
});
</script>
